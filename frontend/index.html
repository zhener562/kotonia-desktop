<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>kotonia</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="top-bar">
    <div class="brand">
      <img id="persona-avatar" class="brand-avatar" alt="" src="" decoding="async">
      <div class="brand-text">
        <span id="persona-name" class="brand-name">…</span>
        <span id="persona-tagline" class="brand-tagline"></span>
      </div>
    </div>
    <div id="auth-status" class="auth-status checking">checking…</div>
    <div class="top-actions">
      <button id="btn-new-session" type="button" title="新しいセッション">新規</button>
      <button id="btn-clear-log" type="button" title="ログをクリア">クリア</button>
      <button id="btn-toggle-voice" type="button" title="Iris の声を ON/OFF" aria-pressed="false">🔇 voice</button>
      <button id="btn-toggle-preview" type="button" title="プレビューペイン表示切替" hidden>▶ プレビュー</button>
    </div>
  </header>

  <div id="app-shell" class="app-shell">
    <main class="log-pane" id="log" aria-live="polite"></main>
    <aside id="preview-pane" class="preview-pane hidden">
      <div class="preview-header">
        <span id="preview-path" class="preview-path" title=""></span>
        <button id="preview-refresh" type="button" title="再読み込み" class="preview-btn-sm">↻</button>
        <button id="preview-open-external" type="button" title="OS 既定アプリで開く" class="preview-btn-sm">↗</button>
        <button id="preview-close" type="button" title="プレビューを閉じる" class="preview-btn-sm">×</button>
      </div>
      <div class="preview-body">
        <iframe
          id="preview-iframe"
          class="preview-iframe"
          sandbox="allow-scripts allow-same-origin allow-pointer-lock allow-popups-to-escape-sandbox"
          referrerpolicy="no-referrer"
          title="preview"
        ></iframe>
        <div id="preview-error" class="preview-error hidden">
          <h3 class="preview-error-title">プレビューできません</h3>
          <pre id="preview-error-msg" class="preview-error-msg"></pre>
          <p class="preview-error-hint">
            agent が出力した path が実在しない / scope 外 / dir を指してる、のどれかが原因です。<br>
            agent に「<code>ls -la</code> で実体を確認して、絶対パスでもう一度教えて」と頼んでみてください。
          </p>
        </div>
      </div>
    </aside>
  </div>

  <footer class="prompt-bar">
    <form id="prompt-form" autocomplete="off">
      <textarea
        id="prompt-input"
        placeholder="自分の PC に頼んでみる (Enter で送信、Shift+Enter で改行)"
        rows="2"
        autofocus
      ></textarea>
      <button id="prompt-submit" type="submit">送信</button>
    </form>
    <div class="prompt-footer">
      <span id="session-label">session: —</span>
    </div>
  </footer>

  <div id="approval-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-body">
      <h2>承認が必要です</h2>
      <p class="approval-reason" id="approval-reason"></p>
      <pre class="approval-command" id="approval-command"></pre>
      <div class="modal-actions">
        <button id="approval-deny" type="button" class="btn-deny">拒否</button>
        <button id="approval-approve" type="button" class="btn-approve">承認</button>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
