name: Build Desktop

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundles: deb,appimage
          - os: windows-latest
            bundles: nsis,msi
          - os: macos-latest
            bundles: app
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout kotonia-desktop
        uses: actions/checkout@v4
        with:
          path: kotonia-desktop

      # kotonia-cli is a sibling path dependency
      # (`kotonia-cli = { path = "../../kotonia-cli" }` in src-tauri/Cargo.toml),
      # so it must be checked out next to kotonia-desktop, not inside it.
      - name: Checkout kotonia-cli
        uses: actions/checkout@v4
        with:
          repository: zhener562/kotonia-cli
          # Pin the dependency so rerunning a desktop tag reproduces the
          # original binary. Update this tag intentionally when taking a new
          # kotonia-cli release into kotonia-desktop.
          # v0.1.8 — win32 bash resolver (skips the System32 WSL launcher),
          # the CLI half of the Windows support landed in PR #7.
          ref: v0.1.8
          path: kotonia-cli

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: kotonia-desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: kotonia-desktop
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: kotonia-desktop/src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build
        working-directory: kotonia-desktop/src-tauri
        run: cargo tauri build --bundles ${{ matrix.bundles }}

      - name: Sign and zip macOS app
        if: matrix.os == 'macos-latest'
        run: |
          APP_PATH="kotonia-desktop/src-tauri/target/release/bundle/macos/kotonia-desktop.app"
          ZIP_PATH="kotonia-desktop/src-tauri/target/release/bundle/macos/kotonia-desktop_${{ runner.arch }}.app.zip"

          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=4 "$APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kotonia-desktop-${{ matrix.os }}
          path: |
            kotonia-desktop/src-tauri/target/release/bundle/**
          if-no-files-found: error

      # Tag pushes (v0.1.0, v0.2.0, ...) publish a GitHub Release. Each
      # matrix job uploads whatever installer types it produced. macOS is
      # shipped as an ad-hoc signed .app.zip for now; users may still need
      # right-click-open until Developer ID signing and notarization are added.
      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kotonia-desktop/src-tauri/target/release/bundle/deb/*.deb
            kotonia-desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            kotonia-desktop/src-tauri/target/release/bundle/msi/*.msi
            kotonia-desktop/src-tauri/target/release/bundle/nsis/*.exe
            kotonia-desktop/src-tauri/target/release/bundle/macos/*.app.zip
          fail_on_unmatched_files: false
